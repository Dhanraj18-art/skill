<!DOCTYPE html>
<html>

<head>
    <title>SkillSwap Meet</title>
</head>

<body style="margin:0; background:black;">

    <script>
        // Get room from URL
        const params = new URLSearchParams(window.location.search);
        const room = params.get("room") || "skillswap-default";

        // Create Meet iframe dynamically
        document.body.innerHTML = `
        <iframe 
            src="https://meet.jit.si/${room}" 
            allow="camera; microphone; fullscreen"
            width="100%" 
            height="100%" 
            style="border:0;">
        </iframe>
    `;
    </script>

</body>

</html>
