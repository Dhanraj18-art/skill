<!DOCTYPE html>
<html>
<head>
  <title>Signup - SkillSwap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #020617;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      width: 90%;
      max-width: 350px;
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
    }

    img {
      width: 80px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg,#22c55e,#38bdf8);
      color: white;
      font-weight: bold;
    }

    .link {
      margin-top: 15px;
      color: #aaa;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">

  <img src="logo.png">
  <h2>Create Account</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Signup</button>

  <div class="link" onclick="goLogin()">Back to Login</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://bfnvumejiagsrzegwuqq.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmbnZ1bWVqaWFnc3J6ZWd3dXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTY5ODIsImV4cCI6MjA4OTQ5Mjk4Mn0.1AIOCNZGSChd2iUsKnl19SSE4BXeRGe-GP0WdHlTMwA"

)

async function signup() {

  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  const { error } = await supabase.auth.signUp({
    email,
    password
  })

  if (error) {
    alert(error.message)
    return
  }

  alert("Signup successful ✅")

  window.location.href = "login.html"
}

function goLogin() {
  window.location.href = "login.html"
}
</script>

</body>
</html>
